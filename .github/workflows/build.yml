name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure llama.cpp
        run: cmake -S llama.cpp -B llama.cpp/build

      - name: Build llama.cpp
        run: cmake --build llama.cpp/build -j 2

      - name: Build NeuroAi runtime
        run: make
